name: Deploy VitePress site

on:
  push:
    branches: [main]

  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress server deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
      - name: Install dependencies
        run: npm ci

      # --- Build & deploy to the university server (base /butterley/MA2/) ---
      - name: Build with VitePress (server)
        run: npm run build
        env:
          DEPLOY_BASE: "/butterley/MA2/"
      - name: Export PDF (server)
        run: npm run export-pdf
        env:
          DEPLOY_BASE: "/butterley/MA2/"
      - name: Deploy to server over ssh
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i"
          SOURCE: ".vitepress/dist/"
          REMOTE_HOST: "www.mat.uniroma2.it"
          REMOTE_USER: "butterle"
          TARGET: "~/public_html/MA2/"
          EXCLUDE: ""

      # --- Rebuild for GitHub Pages (base /ma2-2024/) ---
      - name: Build with VitePress (GitHub Pages)
        run: npm run build
        env:
          DEPLOY_BASE: "/ma2-2024/"
      - name: Export PDF (GitHub Pages)
        run: npm run export-pdf
        env:
          DEPLOY_BASE: "/ma2-2024/"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
